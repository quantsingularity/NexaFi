upstream api_gateway {
    server api-gateway:5000;
}

upstream web_frontend {
    server web-frontend:80;
}

upstream mobile_frontend {
    server mobile-frontend:80;
}

server {
    listen 80;
    server_name _;

    # API traffic goes to the gateway, which serves everything under /api/v1.
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Mobile app served under /m/ (its build is configured for that base).
    location /m/ {
        proxy_pass http://mobile_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else is the web frontend (SPA).
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# NexaFi Local Development Environment
# Usage: docker compose up -d
# Requires: .env file (copy from .env.example)

version: "3.9"

networks:
  nexafi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  elasticsearch-data:
    driver: local
  user-service-data:
    driver: local
  ledger-service-data:
    driver: local
  payment-service-data:
    driver: local
  ai-service-data:
    driver: local
  ai-models-data:
    driver: local
  analytics-service-data:
    driver: local
  credit-service-data:
    driver: local
  credit-models-data:
    driver: local
  document-storage-data:
    driver: local

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - nexafi-net
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 15s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: nexafi-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --protected-mode yes
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  rabbitmq:
    <<: *service-defaults
    image: rabbitmq:3.12-management-alpine
    container_name: nexafi-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nexafi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: nexafi
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      start_period: 60s

  elasticsearch:
    <<: *service-defaults
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: nexafi-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - cluster.name=nexafi-logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      <<: *healthcheck-defaults
      test:
        - "CMD-SHELL"
        - >
          curl -sf -u elastic:${ELASTICSEARCH_PASSWORD}
          http://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      start_period: 90s

  kibana:
    <<: *service-defaults
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: nexafi-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - xpack.security.enabled=true
      - xpack.encryptedSavedObjects.encryptionKey=${KIBANA_ENCRYPTION_KEY}
      - xpack.reporting.encryptionKey=${KIBANA_REPORTING_KEY}
      - xpack.security.encryptionKey=${KIBANA_SECURITY_KEY}
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:5601/api/status | grep -q ''"overall":{"level":"available"''',
        ]
      start_period: 120s

  # ─── Core Services ──────────────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: api-gateway/Dockerfile
    image: nexafi/api-gateway:dev
    container_name: nexafi-api-gateway
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-nexafi}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_VHOST=nexafi
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]

  user-service:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: user-service/Dockerfile
    image: nexafi/user-service:dev
    container_name: nexafi-user-service
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${USER_DB_URL}
      - JWT_SECRET_KEY=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - user-service-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/v1/health"]

  ledger-service:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: ledger-service/Dockerfile
    image: nexafi/ledger-service:dev
    container_name: nexafi-ledger-service
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${LEDGER_DB_URL}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - ledger-service-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/v1/health"]

  payment-service:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: payment-service/Dockerfile
    image: nexafi/payment-service:dev
    container_name: nexafi-payment-service
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${PAYMENT_DB_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - payment-service-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/v1/health"]

  ai-service:
    <<: *service-defaults
    build:
      context: ../code/ml_services
      dockerfile: ai-service/Dockerfile
    image: nexafi/ai-service:dev
    container_name: nexafi-ai-service
    ports:
      - "5004:5004"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${AI_DB_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - ai-service-data:/app/data
      - ai-models-data:/app/models
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/v1/health"]
      start_period: 60s

  analytics-service:
    <<: *service-defaults
    build:
      context: ../code/ml_services
      dockerfile: analytics-service/Dockerfile
    image: nexafi/analytics-service:dev
    container_name: nexafi-analytics-service
    ports:
      - "5005:5005"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${ANALYTICS_DB_URL}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - analytics-service-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5005/api/v1/health"]

  credit-service:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: credit-service/Dockerfile
    image: nexafi/credit-service:dev
    container_name: nexafi-credit-service
    ports:
      - "5006:5006"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${CREDIT_DB_URL}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - credit-service-data:/app/data
      - credit-models-data:/app/models
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5006/api/v1/health"]

  document-service:
    <<: *service-defaults
    build:
      context: ../code/backend
      dockerfile: document-service/Dockerfile
    image: nexafi/document-service:dev
    container_name: nexafi-document-service
    ports:
      - "5007:5007"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=${DOCUMENT_DB_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - document-storage-data:/app/documents
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:5007/api/v1/health"]

  # ---------------------------------------------------------------------------
  # Frontends and reverse proxy
  # ---------------------------------------------------------------------------
  web-frontend:
    <<: *service-defaults
    build:
      context: ../web-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: nexafi/web-frontend:dev
    container_name: nexafi-web-frontend
    expose:
      - "80"

  mobile-frontend:
    <<: *service-defaults
    build:
      context: ../mobile-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: nexafi/mobile-frontend:dev
    container_name: nexafi-mobile-frontend
    expose:
      - "80"

  reverse-proxy:
    <<: *service-defaults
    image: nginx:1.27-alpine
    container_name: nexafi-reverse-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - web-frontend
      - mobile-frontend

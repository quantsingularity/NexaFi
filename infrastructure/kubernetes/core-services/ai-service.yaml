---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service-sa
  namespace: nexafi
  labels:
    app: ai-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: nexafi
  labels:
    app: ai-service
    tier: backend
    app.kubernetes.io/part-of: nexafi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        tier: backend
    spec:
      serviceAccountName: ai-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ai-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ai-service
          image: nexafi/ai-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: ai-db-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: openai-api-key
            - name: REDIS_HOST
              value: "redis-service.nexafi-infra.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: redis-password
            - name: RABBITMQ_HOST
              value: "rabbitmq-service.nexafi-infra.svc.cluster.local"
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5004
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: ai-models
              mountPath: /app/models
            - name: ai-data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: ai-models
          persistentVolumeClaim:
            claimName: ai-models-pvc
        - name: ai-data
          persistentVolumeClaim:
            claimName: ai-service-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: nexafi
  labels:
    app: ai-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5004"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5004
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: credit-service-sa
  namespace: nexafi
  labels:
    app: credit-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-service
  namespace: nexafi
  labels:
    app: credit-service
    tier: backend
    app.kubernetes.io/part-of: nexafi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credit-service
  template:
    metadata:
      labels:
        app: credit-service
        tier: backend
    spec:
      serviceAccountName: credit-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: credit-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: credit-service
          image: nexafi/credit-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5006
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: credit-db-url
            - name: REDIS_HOST
              value: "redis-service.nexafi-infra.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: redis-password
            - name: RABBITMQ_HOST
              value: "rabbitmq-service.nexafi-infra.svc.cluster.local"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5006
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5006
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: credit-data
              mountPath: /app/data
            - name: credit-models
              mountPath: /app/models
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: credit-data
          persistentVolumeClaim:
            claimName: credit-service-pvc
        - name: credit-models
          persistentVolumeClaim:
            claimName: credit-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: credit-service
  namespace: nexafi
  labels:
    app: credit-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5006"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: credit-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5006
  type: ClusterIP

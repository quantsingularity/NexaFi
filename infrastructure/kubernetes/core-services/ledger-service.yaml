---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledger-service-sa
  namespace: nexafi
  labels:
    app: ledger-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: nexafi
  labels:
    app: ledger-service
    tier: backend
    app.kubernetes.io/part-of: nexafi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
        tier: backend
    spec:
      serviceAccountName: ledger-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: ledger-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ledger-service
          image: nexafi/ledger-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: ledger-db-url
            - name: REDIS_HOST
              value: "redis-service.nexafi-infra.svc.cluster.local"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: redis-password
            - name: RABBITMQ_HOST
              value: "rabbitmq-service.nexafi-infra.svc.cluster.local"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: ledger-data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: ledger-data
          persistentVolumeClaim:
            claimName: ledger-service-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: nexafi
  labels:
    app: ledger-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5002"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: ledger-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5002
  type: ClusterIP
